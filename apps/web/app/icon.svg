<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4361ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3a56d4" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#f0f0f0"/>
      <stop offset="55%" stop-color="#d8d8d8"/>
      <stop offset="75%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4361ee" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3a56d4" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Accent overlay -->
  <rect width="512" height="512" rx="96" fill="url(#accent)"/>
  <!-- Border -->
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="url(#border)" stroke-width="4"/>
  <!-- SW Letters -->
  <text x="256" y="340" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="260" fill="url(#chrome)" letter-spacing="-12">SW</text>
</svg>
