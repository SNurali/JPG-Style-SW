<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <!-- Chrome/metallic gradient for main text -->
    <linearGradient id="chromeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="35%" stop-color="#f0f0f0" />
      <stop offset="50%" stop-color="#d8d8d8" />
      <stop offset="65%" stop-color="#f0f0f0" />
      <stop offset="100%" stop-color="#c0c0c0" />
    </linearGradient>
    <!-- Subtle silver for subtext -->
    <linearGradient id="silverGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888899" />
      <stop offset="50%" stop-color="#aaaabc" />
      <stop offset="100%" stop-color="#888899" />
    </linearGradient>
    <!-- Accent gradient for decorative line -->
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4361ee" stop-opacity="0" />
      <stop offset="30%" stop-color="#4361ee" stop-opacity="1" />
      <stop offset="70%" stop-color="#4361ee" stop-opacity="1" />
      <stop offset="100%" stop-color="#4361ee" stop-opacity="0" />
    </linearGradient>
    <!-- Monogram gradient -->
    <linearGradient id="monoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4361ee" />
      <stop offset="100%" stop-color="#3a56d4" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
      <feFlood flood-color="#4361ee" flood-opacity="0.15" />
      <feComposite in2="blur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- SW Monogram mark -->
  <g transform="translate(0, 12)">
    <!-- Geometric container -->
    <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#monoGrad)" opacity="0.12" />
    <rect x="0" y="0" width="56" height="56" rx="12" fill="none" stroke="url(#monoGrad)" stroke-width="1.5" opacity="0.4" />
    <!-- S letter -->
    <text x="11" y="42" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="32" fill="url(#chromeGrad)" letter-spacing="-1">S</text>
    <!-- W letter -->
    <text x="28" y="42" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="32" fill="url(#chromeGrad)" letter-spacing="-1">W</text>
  </g>

  <!-- JPG STYLE subtext -->
  <text x="72" y="26" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="11" fill="url(#silverGrad)" letter-spacing="4" text-rendering="geometricPrecision">JPG STYLE</text>

  <!-- SMARTWASH main text -->
  <text x="70" y="55" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="34" fill="url(#chromeGrad)" letter-spacing="2" filter="url(#glow)" text-rendering="geometricPrecision">SMARTWASH</text>

  <!-- Accent underline bar -->
  <rect x="72" y="62" width="240" height="1.5" rx="0.75" fill="url(#accentLine)" />
</svg>
