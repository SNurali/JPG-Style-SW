<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="swooshGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a0a0a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feOffset result="offOut" in="SourceAlpha" dx="2" dy="2" />
      <feGaussianBlur result="blurOut" in="offOut" stdDeviation="2" />
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal" />
    </filter>
  </defs>

  <!-- JPG-STYLE text -->
  <text x="80" y="50" font-family="'Inter', sans-serif" font-weight="900" font-style="italic" font-size="22" fill="white" style="letter-spacing: 0px;">JPG-STYLE</text>

  <!-- Splash effect (precisely positioned) -->
  <g transform="translate(325, 65) scale(0.65)">
    <!-- Splash shape -->
    <path d="M-60,30 Q-50,0 -30,10 Q-20,-30 10,0 Q40,-20 50,30 Q70,20 60,60 Q30,80 -60,60 Z" fill="#3b82f6" />
    <path d="M-40,25 Q-30,5 -15,15 Q-5,-15 5,15 Q20,5 25,25" fill="none" stroke="white" stroke-width="2" opacity="0.6" />
    <!-- Droplets -->
    <circle cx="-65" cy="20" r="3" fill="#3b82f6" />
    <circle cx="-50" cy="5" r="4" fill="#3b82f6" />
    <circle cx="10" cy="-35" r="5" fill="#3b82f6" />
    <circle cx="65" cy="10" r="3" fill="#3b82f6" />
    <circle cx="75" cy="40" r="4" fill="#60a5fa" />
    <circle cx="0" cy="-55" r="3" fill="white" />
  </g>

  <!-- SmartWash text as one word -->
  <text x="40" y="105" font-family="'Inter', sans-serif" font-weight="900" font-style="italic" font-size="68" fill="url(#textGradient)" filter="url(#shadow)">SmartWash</text>

  <!-- Sharp Silver Swoosh -->
  <path d="M40,118 Q200,135 360,118 L360,123 Q200,140 40,123 L40,118 Z" fill="url(#swooshGradient)" filter="url(#shadow)" />
</svg>
