version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smartwash_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-smartwash}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smartwash}
      POSTGRES_DB: ${DB_DATABASE:-smartwash_db}
    ports:
      - "5437:5432"
    volumes:
      - smartwash_pgdata:/var/lib/postgresql/data
    networks:
      - smartwash_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-smartwash} -d ${DB_DATABASE:-smartwash_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartwash_redis
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - smartwash_redisdata:/data
    networks:
      - smartwash_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: smartwash_api
    restart: always
    environment:
      - PORT=3011
      - DATABASE_URL=postgresql://${DB_USERNAME:-smartwash}:${DB_PASSWORD:-smartwash}@smartwash_postgres:5432/${DB_DATABASE:-smartwash_db}
      - NODE_ENV=production
    networks:
      - smartwash_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://smartwash.uz/api}
    container_name: smartwash_web
    restart: always
    environment:
      - PORT=3010
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://smartwash.uz/api}
    networks:
      - smartwash_net

  # ─── Nginx Proxy (The "magic" gate) ───
  proxy:
    image: nginx:alpine
    container_name: smartwash_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - smartwash_net

volumes:
  smartwash_pgdata:
  smartwash_redisdata:
  smartwash_uploads:

networks:
  smartwash_net:
    driver: bridge
